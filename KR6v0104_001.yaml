body:
  text: 方廣錩一問題的提出南朝齊末梁初發生了一件現在看來在佛教文獻學史上很有意思的事情那就是江泌女子僧法靜坐誦出經根據目前掌握的資料最詳盡地紀録了這件事的是同時代的梁僧祐的出三藏記集下面先把出三藏記集的有關記載抄録如下僧法尼所誦出經入疑録寶頂經一卷永元元年出時年九歲淨土經七卷永元元年出時年九歲正頂經一卷永元元年出時年九歲法華經一卷永元元年出時年九歲藥草經一卷永元二年出時年十歲太子經一卷永元二年出時年十歲伽耶波經一卷永元二年出時年十歲波羅奈經二卷中興元年出時年十二歲優婁頻經一卷中興元年出時年十二歲益意經二卷天監元年出時年十三智遠承旨般若得經一卷天監元年出時年十三智遠承旨華嚴瓔珞經一卷天監元年出時年十三智遠承旨踰陀衛經一卷天監四年臺內華光殿出時年十六阿那含經二卷天監四年出時年十六妙音師子吼經三卷天監四年出時年十六借張家出乘師子吼經一卷天監三年出時年十五勝鬘經一卷永元元年出時年九歲優曇經一卷永元元年出時年九歲妙莊嚴經四卷永元元年出時年九歲維摩經一卷江家出序七世經一卷右二十一種經凡三十五卷經如前件齊末太學博士江泌處女尼子所出初尼子年在齠齔有時閉目靜坐誦出此經或説上天或稱神授發言通利有如宿習令人寫出俄而還止經歷旬朔續復如前京都道俗威咸傳其異今上敕見面問所以其依事奉答不異常人然篤信正法少修梵行父母欲嫁之誓而弗許後遂出家名僧法住青園寺祐既收集正典撿括異聞事接耳目就求省視其家祕隱不以見示唯得妙音師子吼經三卷以備疑經之録此尼以天監四年三月亡有好事者得其文疏前後所出經二十餘卷厥舅孫質以為真經行疏勸化收拾傳寫既染毫牘必存於世昔漢建安末濟陰丁氏之妻忽如中疾便能胡語又求紙筆自為胡書復有西域胡人見其此書云是經莂推尋往古不無此事但義非金口又無師譯取捨兼懷故附之疑例江泌南齊書有傳未及其女誦經事但傳中謂世祖以為南康王子琳侍讀建武中明帝害諸王後泌憂念子琳詣志公道人問其禍福志公覆香爐灰示之曰都盡無所餘及子琳被害泌往哭之淚盡繼之以血親視殯葬乃去志公道人即著名的神異僧人寶志這説明江泌家確有信仰佛教的傳統南史亦有江泌傳大略相同不具引按照上述記載這個僧法乃江泌的女兒生於南齊永明九年從南齊永元元年歲那年開始有時閉目靜坐口中就會念念有詞地誦出佛經據説他誦時十分流利就好像以前曾經學習過一樣就這樣斷斷續續過一段時間誦出一部並由人紀録下來當年共誦出寶頂經等部第二年永元二年歲時誦出部南齊中興元年歲時又誦出部蕭梁天監元年歲時誦出部蕭梁天監三年歲時誦出部蕭梁天監四年歲時誦出部總共誦出部卷他的事迹轟動了建業連梁武帝也親自詔他面見天監四年有一部踰陀衛經是在臺內華光殿中誦出的大概就是梁武帝這次召見的結果據説由於他自己的堅持家人祗好同意他出家出家後的法名叫僧法故經録中稱他為僧法尼住在青園寺但可惜短命夭亡天監四年三月才祗有歲便亡故僧祐生於劉宋元嘉二十二年死於梁天監十七年終年歲齊梁時代著名的律學大師佛教目録學家佛教文史學家所編纂的出三藏記集至今以嚴謹著稱僧祐一生主要活動在建業今江蘇南京而僧法誦經事正發生在建業僧祐自稱對此事事接耳目亦即曾經耳聞目睹他甚至親自上門採訪因此事情的可靠性應該沒有懷疑起碼僧祐自己對此沒有懷疑當然僧祐的上述記載略有錯誤既然該僧法永元二年時祗有歲則中興元年應該是歲而不能是歲誠如此則他逝世時年僅歲後代經録在僧法年齡問題上著録不一為避文繁不一一介紹對於發生在年前的這一神異的真偽我們現在無法考證也無須考證本文想要研究的是時人及後人怎麼看待這件事這些經典的流傳及下落如何並由此對佛教文獻學中的疑偽經問題作一相關研究二僧祐時代一衆經別録的記載如上所述出三藏記集對僧法誦經事作了詳盡記載其實在出三藏記集之前還有一部著作已經涉及僧法誦出經這就是本世紀在敦煌遺書中發現的衆經別録衆經別録上下兩卷共分十篇首見著録於隋費長房的歷代三寶記卷十五費長房稱它未詳作者似宋時述屬於費長房親眼看到且在撰寫歷代三寶記時曾經參考過的經録其後唐代的大唐內典録也提到了它但道宣是否也見到過這部經録還值得研究當智升撰寫開元釋教録時已經尋本未獲再以後這部經録影蹤全無敦煌藏經洞開啓後人們從中發現了兩件南北朝寫經殘卷正是該亡佚千年之久的衆經別録一件是收藏在英國圖書館的斯號一件是收藏在法國圖書館的伯號伯號録經部分為三個部分第一部分是大乘經録第一首殘尾存第二部分是三乘通教録第二首尾俱全第三部分是三乘中大乘録第三首存尾殘首部的第一部分大乘經録第一殘剩經名部其中著録在最後的兩部是佛説花嚴瓔珞經一卷以菩薩空有二觀神通為宗文佛説般若得道經一卷以般若為萬行首為宗文這兩部就屬於僧法在天監元年誦出的經著録中以某某為宗等是衆經別録的作者對該經論述宗旨的判述亦即佛説花嚴瓔珞經主要論述菩薩行空有二觀以及論述神通等事佛説般若得道經主要論述般若為萬行之首末尾所注的文是指經典的行文風格古代佛教翻譯有直譯意譯兩家直譯的經典行文質朴不太好懂稱為質意譯的經典行文流暢很好讀稱為文古代的翻譯家認為直譯忠實於原文比較可信但過於質野有礙流通意譯文詞流暢固然好讀好懂但也有可能會以詞害義不少人提倡一種文質均的行文風格衆經別録對每部經典的行文風格都有判述諸如文質不文不質文多質少文資均等作為閲讀的指導在此衆經別録認為上兩部經典的行文風格屬於敘述比較流暢的費長房認為衆經別録撰寫於劉宋時代既然這樣其中不應該出現天監元年的僧法誦出經所以在衆經別録中出現的這兩部典籍為研究衆經別録的成書年代資料構成提供了新的視角有關衆經別録本身的研究將另文進行本文暫不涉及衆經別録對上述兩部經典的紀録從另一個方面印證了出三藏記集對僧法誦出經事件的記事證明了僧法誦出經當時的確曾經流通衆經別録對上述兩部經典論述宗旨及行文風格的判述也使我們對這兩部經典的內容與文風有一個基本的了解由於敦煌遺書衆經別録已經殘缺我們現在無法得知當初衆經別録是否對僧法誦出經及所誦經有過更多的記載但無論如何衆經別録收録了這兩部經典證明當時起碼有部分人認可僧法誦出經這件事認同他所誦出的經典並把這些經典與域外傳入的翻譯經典同樣對待收入佛教法藏的代表一切經我們可以把衆經別録的這一態度當作研究出三藏記集的作者僧祐處理這一問題的一個背景資料二僧祐的疑經觀僧祐的出三藏記集因襲道安的綜理衆經目録而來在結構方面沒有很大的創新如果説有那主要體現在疑偽經判定這一方面在中國的佛教文獻學史上道安第一個提出疑偽經問題他在所撰綜理衆經目録中特設疑經録一目並這樣説外國僧法學皆跪而口受同師所受若十二十轉以授後學若有一字異者共相推挍得便擯之僧法無縱也經至晉土其年未遠而熹事者以沙標金斌斌如也而無括正何以別真偽乎農者禾草俱在后稷為之嘆息金匱玉石同緘卞和為之懷恥安敢預學次見涇渭雜流龍蛇並進豈不恥之今列意謂非佛經者如左以示將來學士共知鄙信焉從上文可知道安所列名目雖為疑經録但在這裡作為對象敘述的卻完全是現代意義上的偽經這説明在道安的心目中當時還沒有完全釐清疑經與偽經的區別廓清這兩個概念的不同內涵道安祗是指出疑偽經的存在但沒有分析疑偽經的特點沒有提出鑒別疑偽經的方法所以他的疑偽經鑒別能力也就受到限制他自稱今列意謂非佛經者如左意即完全依據自己的佛學水平來作鑒別這樣的鑒別主觀性太強難免出問題道安所判的寶如來經等部經典其中確有應屬真經者僧祐對疑偽經的研究主要體現在出三藏記集卷五中僧祐在出三藏記集卷五中全文抄録了道安對疑經的論述與鑒別然後設立了一個新集疑經偽撰雜録從這個名目看僧祐似乎已經意識到疑經與偽撰的不同那麼他是怎麼看待並處理這兩者的呢我們先看看他為該録所撰的小序長阿含經云佛將涅槃為比丘説四大教法若聞法律當於諸經推其虛實與法相違則非佛説又大涅槃經云我滅度後諸比丘輩抄造經典令法言薄種智所照驗於今矣自像運澆季浮競者多或憑真以構偽或飾虛以亂實昔安法師摘出偽經二十六部又指慧達道人以為深戒古既有之今亦宜然矣祐挍閲群經廣集同異約以經律頗見所疑夫真經體趣融然深遠假託之文辭意淺雜玉石朱紫無所逃形也今區別所疑注之於録并近世妄撰亦標于末並依倚雜經而自製名題進不聞遠適外域退不見承譯西賓我聞興於戶牖印可出於胸懷誑誤後學良足寒心既躬所見聞寧敢默已嗚呼來葉慎而察焉僧祐在這裡對疑偽經的特點産生途徑鑒別方式都提出自己的意見這在佛教文獻學史上是一大貢獻因不屬本文論述重點在此也置而不論有意思的是僧祐所列名目為疑經偽撰雜録但如上面序中所表述的他所論述的對象仍然祗是偽經這説明什麼在僧祐的心目中疑經與偽撰到底有什麼區別呢在新集疑經偽撰雜録中僧祐共列舉了部經典可以分為兩組前一組部僧祐稱它們或理義乖背或文偈淺鄙故入疑録庶耘蕪穬以顯法寶亦即統統都是偽經僧祐在上述序中也提到該組謂今區別所疑注之於録後一組部每部均有注釋説明該經典是什麼時候由誰撰出僧祐在上述序中稱它們并近世妄撰亦標于末亦即也都是些偽經既然都是偽經為什麼要區分為疑經與偽撰呢仔細考察這部經典原來前一組什麼時候出現怎樣出現等情況一概不清而後一組則都可以找到作者也就是説在僧祐那裏疑經就是偽經偽撰也是偽經只不過前者出處不清後者線索宛然為了強調已經查明後者的作偽者所以稱為偽撰所以僧祐的疑經與偽撰並無本質區別從這個角度講他的疑經觀與道安的疑經觀也沒有什麼本質的區別而與我們現在對疑經的概念很不一樣由於後一組部典籍均有具體的出處簡單考察一下僧祐對這部典籍的辨偽實踐對於理解僧祐的偽經觀以及本文研究的僧法誦出經應該不無幫助灌頂經一卷一名藥師琉璃光經或名灌頂拔除過罪生死得度經右一部宋孝武帝大明元年秣陵鹿野寺比丘慧簡依經抄撰此經後有續命法所以偏行於世提謂波利經二卷舊別有提謂經一卷右一部宋孝武時北國比丘曇靖撰寶車經一卷或云妙好寶車菩薩經右一部北國淮州比丘曇辨撰青州比丘道侍改治菩提福藏法化三昧經一卷右一部齊武帝時比丘道備所撰備易名道歡佛法有六義第一應知一卷未得本六通無礙六根淨業義門一卷未得本右二部齊武帝時比丘釋法願抄集經義所出雖弘經義異於偽造然既立名號則別成一部懼後代疑亂故明注于録佛所制名數經五卷右一部齊武帝時比丘釋王宗所撰抄集衆經有似數林但題稱佛制懼亂名實故注于録衆經要攬法偈二十一首一卷右一部梁天監二年比丘釋道歡撰上面部經可以分為兩類一類是憑空虛構一類是依經抄集屬於前一類的有提謂波利經寶車經菩提福藏法化三昧經衆經要攬法偈二十一首等四部按照正統觀點係後人所撰而敢自稱為經者自然應該貶斥所以僧祐對前三部典籍的抨擊乃他作為佛教經録學家的分內之事但衆經要攬法偈二十一首似作者用偈頌的形式對諸經要點豫以概括名稱上也並無經字僧祐仍毅然排斥或者在僧祐看來法偈兩字也是佛陀的專利他人不得染指令人更感興趣的是下餘四部首先是灌頂經僧祐指斥該經是慧簡依經抄撰所以不應歸入真經慧簡所依的是什麼經僧祐沒有指出但根據現在的材料該經顯然是翻譯而不是抄撰這個問題在隋代達摩笈多譯出佛説藥師如來本願經時已經水落石出所以現在該經仍然保留在大藏經中現在我們知道該經歷史上曾經四次翻譯慧簡為第一譯達摩笈多為第二譯玄奘第三譯義淨第四譯順便説一句敦煌遺書中所存該灌頂拔除過罪生死得度經甚多民間並不因為經録學家的排斥而放棄對該經的信仰佛法有六義第一應知及六通無礙六根淨業義門兩部僧祐並未看到原書但他認為這兩部典籍是比丘釋法願抄集經義撰成雖弘經義異於偽造然既立名號則別成一部懼後代疑亂故明注于録也就是説雖然內容沒有問題雖然可以起到弘揚佛教經義的作用但像這樣自立名號自己撰集成書會讓後人疑惑不知所從所以還是在疑經録中注明其意自然是要藉此示衆以禁絶流通佛所制名數經是比丘釋王宗所撰從名稱可知它大體相當於三藏法數一類的著作類集各種法數以供查閲之便但僧祐稱它雖然抄集衆經有似數林但題稱佛制懼亂名實故注于録也就是説該書雖然可以供人查閲法數但明明是你王宗所撰怎麼能夠稱佛制稱經呢我想就王宗而言大概不至於狂妄到自稱為佛把自己編撰的著作稱為佛制稱經該書的佛所制顯然是指這些名數是佛所制由於著作中所抄集的全部都是佛所制的名數則稱之為經雖不甚妥當但似乎也無不可但僧祐看來這是大大地僭越既然名不副實自然也應該拿出來示衆以禁絶流通這裡還有一個問題出三藏記集也設有抄經録收入各種抄經既然上述佛法有六義第一應知等經也是抄經則歸入抄經録即可何必大張旗鼓地歸入疑經偽撰録非要對它們討伐一番呢我們看看僧祐對抄經録的解釋抄經者蓋撮舉義要也昔安世高抄出修行為大道地經良以廣譯為難故省文略説及支謙出經亦有孛抄此並約寫胡本非割斷成經也而後人弗思肆意抄撮或棋散衆品或爪剖正文既使聖言離本復令學者逐末竟陵文宣王慧見明深亦不能免若相競不已則歲代彌繁蕪黷法寶不其惜歟名部一成難用刊削其安公時抄悉附本録新集所獲撰目如左庶誡來葉無效尤焉從上文可知對於那些撮舉義要但沒有割斷成經的抄經僧祐並不反對而對那些或棋散衆品或爪剖正文既使聖言離本復令學者逐末的抄經僧祐則深惡痛絶我們可以把僧祐歸入抄經録的典籍與他歸入疑經偽撰録的典籍做一個對照前者主要是棋散衆品後者則是抄集衆經前者説明抄自何經後者則另立名題這大概是僧祐將佛法有六義第一應知歸于疑經偽撰録的主要原因綜上所述我們可以總結兩點第一僧祐雖然提出疑經偽撰兩個概念看起來比道安前進了一步但這兩個概念實際都僅指偽經在這一點上與道安無本質區別與我們現在的疑經概念不同第二在鑒別排斥偽經的問題上僧祐的態度是非常嚴厲的三僧祐與僧法誦出經的著録僧祐所謂的疑經實際就是偽經那麼是否僧祐完全沒有意識到還存在著一種無法辨別其真偽的經典亦即我們現在意義上的疑經呢不是的這就是本文要研究的僧法誦出經如前所述僧祐耳聞目睹了僧法誦經事親自到僧法的家中去尋訪希望得到所誦出的經典但由於僧法家不肯出示而未能如願雖則如此僧祐還是設法得到了僧法於天監四年誦出的妙音師子吼經三卷根據該經下面的注釋這部經僧祐是從張家借到的對於僧法誦經事僧祐的態度非常矛盾這些經正如僧祐指出的義非金口又無師譯也就是説既不是釋迦牟尼親口所説又不是譯師翻譯出來而是由一個小姑娘信口誦出的在疑經偽撰雜録的序中僧祐批評當時偽經的製作有這樣一句話進不聞遠適外域退不見承譯西賓我聞興於戶牖印可出於胸懷誑誤後學良足寒心現在僧法的誦經方式與上述我聞興於戶牖印可出於胸懷又有多大區別呢從這個角度講這些經當然不能被認可但是僧法祗是一個十歲左右的小姑娘竟然能夠誦出這些佛經其中是否有什麼神異呢起碼僧法自己是用或説上天或稱神授來解釋的這實在讓篤信佛教自然也篤信佛教神通的僧祐為難他説昔漢建安末濟陰丁氏之妻忽如中疾便能胡語又求紙筆自為胡書復有西域胡人見其此書云是經莂推尋往古不無此事既然如此似乎便不能否認僧法所誦經的合法性像僧祐這樣一個嚴肅而又嚴厲的佛教目録學家一個連可以弘揚佛教的抄經都要排斥的人面對僧法誦出經卻無計可施反復斟酌左右為難用僧祐自己的話説就是取捨兼懷最後沒有辦法祗好故附之疑例從出三藏記集卷五對僧法誦出經的著録也可以看出僧祐這種無可奈何的苦心出三藏記集卷五包括這樣一些子目新集抄經録第一新集安公疑經録第二新集疑經録第三新集安公注經及雜經志録第四小乘迷學竺法度造異儀記第五長安睿法師喻疑第六新集抄經録第一著録抄經新集安公疑經録第二著録道安收集的部偽經新集疑經録第三又名新集疑經偽撰雜録第三著録前述僧祐收集的兩類部偽經新集安公注經及雜經志録第四著録道安的著作小乘迷學竺法度造異儀記第五駁斥小乘學者竺法度長安睿法師喻疑第六著録了鳩摩羅什弟子僧睿的一篇文章而僧法誦出的這些經被安置在新集安公注經及雜經志録第四之後並特意給一個標題僧法尼所誦出經入疑録以與道安的著作分開這樣這批典籍實際是出三藏記集卷四中的第七部分內容與其他六個子目都沒有關係但這部分內容在卷初的子目中又沒有反映出來已經收入某卷卻又沒有歸入該卷的子目在出三藏記集中唯此一例這是一種很奇特的安排因為如果像該標題所説僧法尼所誦出經入疑録則這批典籍應該放在新集疑經録第三中但如果放在疑經録第三中就意味著僧祐認為這批典籍是偽經應該排斥僧祐不願這樣做新集安公注經及雜經志録第四著録的是道安的個人著作那麼僧法的這批誦出經能否當作僧法的個人著作呢當然也不行所以不能把它們與道安著作混同最後祗好不明不白地將它們插在新集安公注經及雜經志録第四與小乘迷學竺法度造異儀記第五之間並加説明取捨兼懷故附之疑例這兒疑例的疑應該是疑惑的意思也就是説到了這時僧祐開始模糊地意識到佛教典籍中還存在一些一時難辨真偽需要進一步考證的東西應該為它們單獨立一個類目從這個意義上講所謂僧法尼所誦出經入疑録的疑録與新集疑經録第三的疑經録內涵並不相等後者在僧祐的辭典中實際是偽經録而前者已經是現代佛教文獻學意義上的疑經録了應該説雖然客觀現實迫使僧祐不得不面對這一問題但僧祐自己在主觀意識上還不是很清楚所以在出三藏記集中沒有出現真正意義上的疑經録所以僧祐處理僧法誦出經時顯得如此無所適從但疑經問題終于非正式地提上了中國佛教文獻學史的議事日程這就是僧祐的貢獻這裡還有一個小問題出三藏記集卷四在僧法誦出經後還著録了部典籍它們是薩婆若陀眷屬莊嚴經法苑經抄為法捨身經其中薩婆若陀眷屬莊嚴經是頭陀道人妙光所造僧祐曾經親自參加關於此經辨偽的討論該經應該歸入新集疑經録第三但不知為何置於此處後兩部典籍已經著録在新集抄經録第一這裡不應重復著録何以會出現上述問題是現在傳本出三藏記集有後人的增補改動是僧祐自己的疏漏現在無法解釋三後代觀點僧祐對這批經典取捨兼懷極為為難後代的經録學家如何處理此事呢目前留存的出三藏記集之後的第一部經録由隋大德法經等編撰的衆經目録該録對所謂僧法誦出經批判極嚴判入偽妄右自寶頂至此二十一經凡三十五卷是南齊末年太學博士江泌女子尼名僧法年八九歲有時靜坐閉目誦出楊州道俗咸稱神授但自經非金口義無傳譯就令偶合不可以訓故附偽録前八十一經並號乖真或首掠金言而末申謠讖或初論世術而後託法詞或引陰陽吉凶或明神鬼禍福諸如此比偽妄灼然今宜祕寢以救世患法經等人的態度十分明確經非金口義無傳譯就必須豫以排斥即使它的內容與佛教相符合也不能允許它的存在在這裡翻譯的形式要比經典的內容更加重要我認為這是非常值得我們注意的一種思想方法因為這種思想方法此後再中國佛教界一直擁有較大的影響費長房歷代三寶記對僧法誦出經的態度與法經録有些不同他説太學博士江泌女小而出家名僧法年八九歲有時靜坐閉目誦出前經揚州道俗咸稱神授房驗經論斯理皎然是宿習來非關神授且據外典夫子有云生而知者聖學而知者次此局談今生味於過去爾若不爾者何以得辨外內賢聖淺深過現乎他不是簡單地豫以肯定或否定而是追索其原因他認為這不是什麼神授而是輪回轉世過程中後一生對前一生經驗的憶持他進而舉例説故高僧傳云釋曇諦者俗姓康氏其先康居人漢靈帝時移附中國獻帝末亂移止吳興諦父肜嘗為冀州別駕母黃氏晝眠夢見一僧呼黃為母寄一麈尾并鐵鏤書鎮黃既眠覺見二物具存私密異之因而懷孕生諦諦年五歲母以麈尾等示之諦曰秦王所餉母曰汝置何處答曰不憶至年十歲出家學不從師悟自天發此即其事後隨父之樊鄧遇見關中僧䂮道人忽然喚䂮曰童子何以呼宿士名諦曰阿上本是諦沙彌曾為衆僧採菜被野豬傷不覺失聲今可忘耶然僧䂮經為弘覺法師弟子為僧採菜被野豬所傷䂮初不憶此乃詣諦父具説諦生本末并示䂮書鎮麈尾等䂮乃悟而泣曰即䂮先師弘覺法師也師經為姚萇講法華貧道為都講姚萇餉二物今遂在此追計弘覺捨命正是寄物之日復憶採菜之事彌增悲悼諦後覽內外遇物斯記晚入吳虎丘山寺講禮易春秋各七遍法華大品維摩各十五遍又善屬文有集六卷盛行世年六十餘終宋元嘉末年也房曰弘覺法師弟子僧䂮師徒匠道名重二秦什物三衣亦復何限唯書鎮麈尾保惜在懷及移識託生此之二物遂得同往神外質礙之像尚得相隨況心內慮知之法而不憶念所以鏡瑩轉明刃砥彌利渧聚為海塵積成山世世習而踰增生生學而益廣近匹初始之月終至十五團圓費長房言之鑿鑿地從佛教角度用輪回轉世後對前生的憶持來解釋僧法的誦經似乎也可以言之成理所以費長房總結説捨人還受