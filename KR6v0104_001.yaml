人情事須重詳且編疑録從上述文字可以看出智升非常為難一方面懷疑這兩卷經就是僧法誦出經另一方面又不能確證從所得經文內容看亦涉人情就是好像有後人編造的迹象但也不敢遽然下決定説它一定是偽經萬一説錯豈不有謗佛的嫌疑祗好説事須重詳且編疑録僧法誦的這部益意經至此就完全清楚了僧祐實際得到了這部經但自己並沒有意識到它就是僧法誦經此後這部經一直流傳著雖然正統的經録學家一般都排斥僧法誦經不準它們入藏但這部經糊裏糊塗地被當成是一個叫法尼的僧人所譯所以沒有被銷毀甚至在大周録中入藏直到智升才基本攪清這個問題由於智升將它趕出大藏經所以亡佚般若得經一卷天監元年出時年十三智遠承旨如前所説衆經別録已經著録了僧法誦出的這部經典作佛説般若得道經一卷以般若為萬行首為宗文這裡有一個問題般若得經與般若得道經名稱差一個字兩者是同一部經嗎其實兩者的確是同一部經這個問題祗要對照考察法經録與仁壽録就可以明白先看法經録在法經等人所撰的衆經目録以下簡稱法經録卷二之大乘修多羅藏録第一衆經疑惑五中載有疑偽經般若得經一卷而在衆經偽妄六中又載般若得經一卷梁天監元年出時年十三歲兩部經同一個名稱為什麼一部歸入疑惑一部歸入偽妄呢問題還要追索到出三藏記集出三藏記集在僧法尼所誦出經入疑録中著録了般若得經之外在卷四的失譯雜經録之無本録中也著録了這部經作波若得經一卷般波在此相通證明該般若得經與前述益意經等一樣實際也已經被僧祐收集到只是僧祐同樣沒有意識到它屬於僧法誦出經把它也歸入失譯經法經録的特點之一就是嚴於真偽之別顯然法經等發現該經與僧法誦出經中的般若得經同名本身的來歷又不清懷疑它就是僧法誦出經所以歸入疑惑以供再考再看仁壽録隋仁壽年間所撰的衆經目録故稱仁壽録卷四疑偽部分有這樣兩條著録般若得道經一卷般若得經一卷梁天監元年出時年十三歲將仁壽録中般若得道經及其前後同時著録的諸經與法經録疑惑五中的般若得經及其前後同時著録的諸經相比較可知這兩部經實際是同一部這説明般若得經另有一個名字叫般若得道經不少經典法經録作為疑惑待勘的仁壽録一概作為疑偽經豫以貶斥反映了更加嚴厲的態度般若得經也是被貶斥的典籍之一值得注意的是歷代三寶記也著録了這部般若得道經當作是漢代失譯經不僅如此還收入入藏録這證明直到隋代這部經還在流傳其後該經被古今譯經圖記卷一作為漢代的失譯經著録並稱它雖不知譯人經是正經校讎梵文允合真理還依舊録附之後漢大周刊定衆經目録卷十一依據房録擬定它失譯經但在卷十五又判定它為疑偽經自相矛盾但未入藏開元釋教録卷十八的偽妄亂真録收入此經這樣紀録般若得道經一卷法經録云般若得經或可般若得經即是僧法尼所誦者智升謹慎地指出它與僧法誦出經的關係沒有作正式判斷但是由於智升把它歸為偽妄亂真録從此此經失去正統地位漸漸亡佚總之般若得經又名般若得道經內容是講般若為萬行首道安録沒有著録別録作失譯判作大乘經收歸入藏祐録著録為失譯經法經録判為疑經房録判為漢代失譯真經並入藏仁壽録判為疑偽經古今譯經圖記判作失譯真經大周録著録自相矛盾開元録判作偽經該經在隋代還在流傳華嚴瓔珞經一卷天監元年出時年十三智遠承旨華嚴瓔珞經的情況與般若得經的情況基本相似最早著録該經的是衆經別録作佛説花嚴瓔珞經一卷以菩薩空有二觀神通為宗文其後出三藏記集在將僧法誦出經當作疑經進行著録的同時在卷四失譯雜經録中又著録了該經作華嚴瓔珞經一卷值得注意的是該經還被齊太宰竟陵文宣王收入所編法集録中作華嚴瓔珞二卷右第三帙並在法集録序中提到這部經稱是以淨住命氏啓入道之門華嚴瓔珞標出世之術所謂淨住指的是收為法集録第一部著作的淨住子十卷而説華嚴瓔珞經標出世之術則與衆經別録所説的以菩薩空有二觀神通為宗基本相合説明該經當時不但流通而且受到人們的重視法經録除了在僧法誦出經中著録該經外別無著録但歷代三寶記則將華嚴瓔珞經一卷與般若得經一起著録為漢代失譯經從費長房對這些經典的解釋可知他誤解了僧祐録的體例從而把僧祐的失譯經判定為漢代失譯大唐內典録依然承襲歷代三寶記的著録將該經作為漢代失譯這種觀點又為古今譯經圖記卷一所繼承大周録也把它當作漢代失譯經可以認為由於該經在隋代已經亡佚所以後代經録判其為漢代失譯祗是照抄前代經録的記載而已仍然是智升發現了這一問題他在開元録卷一著録了華嚴瓔珞經與般若得經然後注曰已上二經僧法尼誦出亦在偽録指出所謂失譯華嚴瓔珞經就是僧法誦出經踰陀衛經一卷天監四年臺內華光殿出時年十六該經情況比較簡單出三藏記集其餘部分未收其他經録大體依據出三藏記集在僧法誦出經中著録此經但均未著録見到經本由此看來這部經在僧法以後不久亡佚阿那含經二卷天監四年出時年十六與益意經一樣阿那含經也被僧祐著録在失譯雜經録的有譯本部分中並與益意經排列在一起作阿那含經二卷益意經二卷但法經録著録時也發現它的可疑於是像對待般若得經一樣把它歸入卷二的衆經疑惑歷代三寶記在處理這批失譯經時則按照自己的判斷將該經當作晉代失譯著録在卷七但有意思的是除了上述僧法誦出阿那含經漢代失譯阿那含經外歷代三寶記卷十又著録了一部同名的阿那含經阿那含經二卷右一十四部合三十六卷文帝元嘉四年涼州沙門釋智嚴弱冠出家遊方博學遂於西域遇得前經梵本齎來達到楊都於枳園寺共寶雲出嚴之神德備高僧傳不復委載這樣不計僧法誦出經就出現了二部阿那含經都是兩卷但是出三藏記集的入藏録卻祗收了一部由於房録的入藏録都不附譯著者名所以就不知所收者到底是哪一部仁壽録卷四疑偽録著録阿那含經二卷也沒有説明到底是哪一種大唐內典録的著録與歷代三寶記一樣著録了失譯二卷本與智嚴譯二卷本但沒有收歸入藏古今譯經圖紀也分別著録失譯本與智嚴譯本大周録卷七收入智嚴本卷十一著録失譯本但入藏録中同樣不收智升怎麼處理這三種阿那含經呢開元録卷三對房録中的東晉失譯經進行了清理指出其中部都有問題阿那含經也在其中稱阿那含經二卷宋智嚴譯偽録亦有在這裡智升完全否定了房録將阿那含經當作東晉失譯的觀點認為該經或者是智嚴譯或者是偽經也就是僧法誦出經並非失譯這實際連帶指出了出三藏記集把阿那含經當失譯經的錯誤在開元録卷五及卷十五智升都著録了智嚴翻譯的阿那含經但同時指出該經闕本智升本人從來沒有見過關於智嚴的譯經應該説存在不少疑點本文限於篇幅無法詳述留待將來另文敘述但智升的確見過一本阿那含經見開元録卷十八偽妄亂真録阿那含經二卷余親見一本一卷成部亦是人造右按長房等代録及失譯録俱有此經僧法尼誦中復有阿那含經二卷即並無本詮定真偽難分且各存其目智升看到的是一卷本古代由於紙張抄寫等原因諸經卷數略有參差本不足怪如上所述其實智升已經傾向把該一卷本判為僧法誦出經但表述時仍然非常謹慎我的看法所謂失譯本來就不存在所謂智嚴本也是子虛烏有阿那含經祗有一種就是僧法誦出本原為兩卷但智升看到時演變為一卷開元以後亡佚妙音師子吼經三卷天監四年出時年十六借張家這是僧祐當初親眼目睹的唯一的一部僧法誦出經這裡的張家自然已經不可考但説明當時佛經流通的方式之一是個人之間的傳抄出三藏記集其餘部分未收該經其他經録大體依據出三藏記集在僧法誦出經中著録此經但均未著録見到經本由此看來這部經在僧法以後不久亡佚出乘師子吼經一卷天監三年出時年十五出三藏記集其餘部分未收此經其他經録大體依據出三藏記集在僧法誦出經中著録此經但均未著録見到經本由此看來這部經在僧法以後不久亡佚勝鬘經一卷永元元年出時年九歲勝鬘經本是一部重要的大乘經典它的翻譯情況比較清楚歷史上共三譯第一譯勝鬘經一卷亦云勝鬘師子吼一乘大方便經北涼天竺三藏曇無讖譯第二譯勝鬘師子吼一乘大方便方廣經一卷亦直云勝鬘經宋天竺三藏心那跋陀羅譯第三譯大寶積經勝鬘夫人會一卷大唐三藏菩提流志譯上述三譯第一譯譯經亡佚後兩譯收在大藏經中至於僧法誦出的勝鬘經出三藏記集其餘部分未收此經其他經録大體依據出三藏記集在僧法誦出經中著録此經但均未著録見到經本由此看來這部經在僧法以後不久亡佚優曇經一卷永元元年出時年九歲出三藏記集其餘部分未收此經其他經録大體依據出三藏記集在僧法誦出經中著録此經但均未著録見到經本由此看來這部經在僧法以後不久亡佚妙莊嚴經四卷永元元年出時年九歲出三藏記集其餘部分未收此經其他經録大體依據出三藏記集在僧法誦出經中著録此經但均未著録見到經本由此看來這部經在僧法以後不久亡佚維摩經一卷江家出維摩經的情況與勝鬘經相同這是一部重要的大乘經典前後多次翻譯有闕有存按照開元録卷十一卷十四的記載情況如下古維摩詰經二卷後漢臨淮沙門嚴佛調譯第一譯闕維摩詰經二卷或三卷吳月支優婆塞支謙譯第二譯存異毗摩羅詰經三卷祐云異維摩詰或作思字或二卷西晉西域優婆塞竺叔蘭譯第三譯闕維摩詰所説法門經一卷或云維摩詰經西晉三藏竺法護譯第四譯謹按僧祐録中更有刪維摩詰經一卷亦云竺法護譯下注云祐意謂先出維摩繁重護刪出逸偈也今意與前無異故不別存又周録中更有毗摩羅詰經二卷亦云吳黃武年支謙譯出長房録撿長房録無此經名周録誤也闕維摩詰經四卷東晉西域三藏祇多蜜譯第五譯闕維詰所説經三卷一名不可思議解脫或直云維摩詰經姚秦三藏鳩摩羅什譯第六譯存説無垢稱經六卷大唐三藏玄奘譯出內典録第七譯存此外智升還指出其西晉沙門支敏度合一支兩竺三本共為五卷者以非別翻又闕本故不存之至於僧法誦出維摩經出三藏記集其餘部分未收其他經録大體依據出三藏記集在僧法誦出經中著録此經但均未著録見到經本由此看來這部經在僧法以後不久亡佚序七世經一卷出三藏記集其餘部分未收此經其他經録大體依據出三藏記集在僧法誦出經中著録此經但均未著録見到經本由此看來這部經在僧法以後不久亡佚上述部經典誦出後便在民間流傳得到轟動的效果乃至驚動梁武帝但是當時的流傳方式是在民間借本抄寫以致像僧祐這樣的大師登門拜訪也不能得到經本當然這大概也是江泌家唯恐僧祐得本後會不利於僧法的緣故所以僧祐只能曲折地通過張家得到一部妙音師子吼經由於這一原因僧祐從其他途徑得到或得知益意經般若得經華嚴瓔珞經阿那含經等四部也不知道它們就是僧法誦出經把它們錯誤地著録在失譯雜經録中從而引起後代的誤解造成誤解的另一個重大原因是費長房的疏漏僧祐的失譯雜經録收經部來源非常復雜僧祐自己説尋此録失源多有大經詳其來也豈天墜而地踊哉將是漢魏時來歲久録亡抑亦秦涼宣梵成文屆止或晉宋近出忽而未詳譯人之闕殆由斯歟尋大法運流世移六代撰注群録獨見安公以此無源未足怪也這一段分析應該説是很精辟的但費長房編纂歷代三寶記時如何處理這部經典呢我們祗要看看他在歷代三寶記中的三條説明即可明白歷代三寶記卷四右一百二十五部合一百四十八卷並是僧祐律師出三藏記撰古舊二録及道安失源并新集所得失譯諸經部卷甚廣讎校群目蕪穢者衆出入相交實難詮定未睹經卷空閲名題有入有源無入無譯詳其初始非不有由既涉年遠故附此末冀後博識脫覿本流希還收正以為有據瀅澄法海使靜濤波焉歷代三寶記卷五右一百一十部合二百九十一卷並是古舊二録失譯諸經今結附此以彰遠年至所依據歷代三寶記卷七右五十三經合五十七卷並是僧祐三藏集記新集失譯見有經本者凡八百四十六部合八百九十五卷已外散入諸代世録所餘附此為晉下失源房録的主體是代録費長房把祐録的失譯經中那些自己以為可以分判的諸經鑒別後散入諸代録因剩下也必須按照代録體例處理便祗好分別為漢代失譯魏吳失譯晉代失譯歸入卷四卷五卷七他自己也感到這樣並不妥當所以説冀後博識脫覿本流希還收正以為有據瀅澄法海使靜濤波焉但無論如何這總給別人一個錯覺以為這些經就是這些朝代失譯的從而造成混亂另外僧祐講的非常明白出三藏記集的失譯雜經録包含了從漢到晉宋諸多失譯經但費長房卻把它們祗歸入晉以前在歷代三寶記的宋齊梁代録中竟然沒有一部失譯經這樣就把大量後代所出經典的年代前移造成又一種混亂從上述考察也可以知道智升的開元釋教録所以得到人們的高度評價不是偶然的相比之下道宣的大唐內典録則實在有點盛名之下其實難副就僧法誦出經的流傳而言它們不但在當時産生相當大的影響如被載入衆經別録豫以流通被木道賢上獻朝廷被收入法集録等等其後其中的般若得經阿那含經被歷代三寶記收歸入藏益意經被大周録收歸入藏甚至直到開元年間仍然存在被智升所見此時距離僧法的生活時代已經有多年我們不能不佩服宗教力量的巨大由於這些經典譯經全部亡佚我們現在無法對它們作出更為詳細的研究目前敦煌遺書的整理還沒有完成我們寄希望於將來的發現
